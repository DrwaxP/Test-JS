<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>banco de dados</title>
</head>
<body>
    <header>
        <h1>Hello, World!</h1>
    </header>
    <section>
        <h2>Banco de dados 2.0</h2>
        <input type="text" placeholder="Digite seu nome" class="nome">
        <br>
        <input type="number" placeholder="Digite sua idade" class="idade">
        <br>
        <input type="email" placeholder="Digite seu email" class="email">
        <br>
        <input type="password" placeholder="Digite sua senha" class="senha">
        <br>
        <input type="submit" value="Enviar" class="enviar" onclick="enviarDados()">

        <div class="resultado"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
